<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - WeScan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navigation -->
  <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between h-20">
        <div class="flex items-center">
          <a href="index.html" class="text-2xl font-light tracking-tight">
            Scanner<span class="font-semibold">2Email</span>
          </a>
        </div>
        <div class="flex items-center space-x-8">
          <a href="index.html#features" class="text-sm text-gray-600 hover:text-black transition-colors">Features</a>
          <a href="index.html#pricing" class="text-sm text-gray-600 hover:text-black transition-colors">Pricing</a>
          <a href="signup.html" class="text-sm text-gray-600 hover:text-black transition-colors">Sign In</a>
          <a href="signup.html" class="text-sm px-6 py-3 bg-black text-white rounded-full hover:bg-gray-800 transition-colors">
            Start Free Trial
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="min-h-screen flex flex-col justify-center px-6 pt-20 pb-12">
    <div class="mx-auto w-full max-w-md">

      <!-- Logo -->
      <div class="text-center mb-8" data-aos="fade-up">
        <a href="index.html" class="text-2xl font-light tracking-tight">
          Scanner<span class="font-semibold">2Email</span>
        </a>
      </div>

      <!-- Sign Up Card -->
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100" data-aos="fade-up" data-aos-delay="100">
        <h2 class="text-2xl font-semibold mb-6">Create your account</h2>

        <!-- OAuth Buttons -->
        <div class="space-y-4 mb-8">
          <button onclick="window.location.href='#'"
                  class="w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-full text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            <!-- Google SVG logo -->
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

          <button onclick="window.location.href='#'"
                  class="w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-full text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            <!-- Microsoft SVG logo -->
            <svg class="h-5 w-5 mr-2" viewBox="0 0 21 21">
              <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
              <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
              <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
              <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
            </svg>
            Continue with Microsoft
          </button>

          <button onclick="window.location.href='#'"
                  class="w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-full text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            <!-- Apple SVG logo -->
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            Continue with Apple
          </button>
        </div>

        <div class="relative mb-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">or</span>
          </div>
        </div>

        <!-- Email Form -->
        <form action="#" method="POST" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Work email
            </label>
            <input type="email" name="email" required placeholder="you@company.com"
                   class="w-full px-4 py-3 rounded-full border border-gray-300 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all">
          </div>

          <button type="submit"
                  class="w-full px-4 py-3 bg-black text-white rounded-full hover:bg-gray-800 transition-colors">
            Continue with email
          </button>
        </form>

        <p class="text-xs text-gray-400 text-center mt-6">
          By signing up, you agree to our <a href="#" class="text-black underline">Terms</a> and <a href="#" class="text-black underline">Privacy Policy</a>.
        </p>
      </div>

      <!-- Footer -->
      <p class="text-center mt-6 text-sm text-gray-500" data-aos="fade-up" data-aos-delay="200">
        Already have an account?
        <a href="signup.html" class="text-black font-medium">Sign in</a>
      </p>

      <!-- Help links -->
      <div class="text-center mt-12 space-x-6" data-aos="fade-up" data-aos-delay="300">
        <a href="compatibility.html" class="text-sm text-gray-400 hover:text-black transition-colors">Compatible Devices</a>
        <a href="setup-guide.html" class="text-sm text-gray-400 hover:text-black transition-colors">Setup Guide</a>
        <a href="troubleshooting.html" class="text-sm text-gray-400 hover:text-black transition-colors">Help</a>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, offset: 100, once: true });
  </script>
</body>
</html>
