<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Link Expired — WeScan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <nav class="w-full bg-white/90 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 flex justify-between h-20 items-center">
      <a href="/" class="text-2xl font-light tracking-tight">
        We<span class="font-semibold">Scan</span>
      </a>
      <a href="/" class="text-sm text-gray-500 hover:text-black transition-colors">What is WeScan?</a>
    </div>
  </nav>

  <div class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="max-w-md w-full text-center">
      <div class="w-16 h-16 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-light tracking-tight text-gray-900 mb-2">
        This link has <span class="font-semibold">expired</span>
      </h1>
      <p class="text-gray-500 mb-8">
        The shared document is no longer available. Ask the sender to share it again.
      </p>
      <a href="/" class="inline-block px-8 py-4 bg-black text-white rounded-full hover:bg-gray-800 transition-colors text-sm font-medium">
        WeScan Home
      </a>
    </div>
  </div>

  <footer class="border-t border-gray-100 py-6 bg-white">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <p class="text-sm text-gray-400">
        Shared securely via <a href="/" class="text-black font-medium hover:underline">WeScan</a>
      </p>
    </div>
  </footer>
</body>
</html>
