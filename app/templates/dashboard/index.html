{% extends "base.html" %}
{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4">SMTP Settings</h2>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium">SMTP Server</label>
                <div class="flex">
                    <input type="text" value="smtp.scanner2email.com" readonly 
                           class="bg-gray-50 px-3 py-2 rounded border flex-1">
                    <button onclick="copyToClipboard(this)" 
                            class="ml-2 bg-blue-500 text-white px-3 py-2 rounded">
                        Copy
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium">Port</label>
                <input type="text" value="587" readonly 
                       class="bg-gray-50 px-3 py-2 rounded border w-full">
            </div>

            <div>
                <label class="block text-sm font-medium">Username</label>
                <div class="flex">
                    <input type="text" value="{{ user.smtp_username }}" readonly 
                           class="bg-gray-50 px-3 py-2 rounded border flex-1">
                    <button onclick="copyToClipboard(this)" 
                            class="ml-2 bg-blue-500 text-white px-3 py-2 rounded">
                        Copy
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium">Password</label>
                <button onclick="generatePassword()" 
                        class="bg-green-500 text-white px-4 py-2 rounded">
                    Generate New Password
                </button>
                <div id="password_container" class="hidden mt-2">
                    <input type="text" id="smtp_password" readonly 
                           class="bg-gray-50 px-3 py-2 rounded border w-full">
                </div>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-xl font-bold mb-4">Recipients</h3>
            <div class="space-y-4">
                {% for recipient in recipients %}
                <div class="flex justify-between items-center py-2 border-b">
                    <span>{{ recipient.email }}</span>
                    <form method="POST" action="{{ url_for('dashboard.delete_recipient', id=recipient.id) }}"
                          class="inline">
                        <button type="submit" 
                                class="text-red-500 hover:text-red-700">
                            Delete
                        </button>
                    </form>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script>
async function generatePassword() {
    const response = await fetch('/dashboard/smtp/generate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        }
    });
    const data = await response.json();

    document.getElementById('smtp_password').value = data.smtp_password;
    document.getElementById('password_container').classList.remove('hidden');
}
function copyToClipboard(button) {
    const input = button.previousElementSibling;
    input.select();
    document.execCommand('copy');
}
</script>
{% endblock %}
