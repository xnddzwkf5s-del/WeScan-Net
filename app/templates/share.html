<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shared Document — WeScan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="w-full bg-white/90 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 flex justify-between h-20 items-center">
      <a href="/" class="text-2xl font-light tracking-tight">
        We<span class="font-semibold">Scan</span>
      </a>
      <a href="/" class="text-sm text-gray-500 hover:text-black transition-colors">What is WeScan?</a>
    </div>
  </nav>

  <!-- Main -->
  <div class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="max-w-md w-full text-center">
      <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>

      <h1 class="text-2xl font-light tracking-tight text-gray-900 mb-2">
        A document was <span class="font-semibold">shared with you</span>
      </h1>
      <p class="text-gray-500 mb-8">{{ filename }}</p>

      <a href="/share/{{ token }}/download"
         class="inline-block px-8 py-4 bg-black text-white rounded-full hover:bg-gray-800 transition-colors text-sm font-medium mb-4">
        Download PDF
      </a>

      <p class="text-sm text-gray-400">
        Downloaded {{ download_count }} time{% if download_count != 1 %}s{% endif %}
      </p>
      <p class="text-sm text-gray-400" id="expiry">
        Link expires {{ expires_at.strftime('%d %b %Y at %H:%M UTC') }}
      </p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-gray-100 py-6 bg-white">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <p class="text-sm text-gray-400">
        Shared securely via <a href="/" class="text-black font-medium hover:underline">WeScan</a>
        — Scan. Sign. Send.
      </p>
    </div>
  </footer>
</body>
</html>
